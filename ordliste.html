<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Skriblerne - gjennomgang av 365 faste ord">
    <title>Ordlisten - Skriblerne</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260622-18">
</head>
<body>
    <div class="review-shell">
        <header class="topbar" role="banner">
            <div>
                <h1 class="site-title">Skriblerne</h1>
                <p class="subtitle">Ordgjennomgang</p>
            </div>
            <div class="topbar-actions" aria-label="Sidevalg">
                <div class="identity-switch" aria-label="Velg hvem du er">
                    <span class="identity-prefix" id="identityLabel">Jeg er</span>
                    <button class="identity-button" type="button" data-identity="henry" aria-pressed="true">Henry</button>
                    <button class="identity-button" type="button" data-identity="ellinor" aria-pressed="false">Ellinor</button>
                </div>
                <a class="text-link" href="index.html">Dagens ord</a>
            </div>
        </header>

        <main class="word-review" role="main">
            <section class="review-intro" aria-labelledby="reviewHeading">
                <p class="eyebrow">365 faste ord</p>
                <h2 id="reviewHeading">Gå gjennom ordlisten</h2>
                <p id="reviewSummary">Laster ordlisten.</p>
                <p class="review-readiness" id="reviewReadiness" role="status" aria-live="polite">Sjekker gjennomgangen.</p>
                <div class="review-actions">
                    <button class="review-export-button" id="firstPassButton" type="button" disabled>Start første-pass</button>
                    <button class="review-export-button" id="importReviewButton" type="button" disabled>Importer gjennomgang</button>
                    <button class="review-export-button" id="exportReviewButton" type="button" disabled>Eksporter gjennomgang</button>
                </div>
                <div class="review-filter-bar" aria-label="Filtrer ordlisten">
                    <button class="review-filter-button" type="button" data-review-filter="all" aria-pressed="true">Alle</button>
                    <button class="review-filter-button" type="button" data-review-filter="open" aria-pressed="false">Uavklarte</button>
                    <button class="review-filter-button" type="button" data-review-filter="mine" aria-pressed="false">Mangler meg</button>
                    <button class="review-filter-button" type="button" data-review-filter="flagged" aria-pressed="false">Se på</button>
                    <button class="review-filter-button" type="button" data-review-filter="suggested" aria-pressed="false">Forslag</button>
                    <button class="review-next-button" id="nextOpenButton" type="button" disabled>Neste uavklarte</button>
                </div>
                <div class="review-month-nav" id="reviewMonthNav" aria-label="Hopp til måned"></div>
                <input id="importReviewInput" type="file" accept="application/json,.json" hidden>
                <p class="review-status" id="reviewStatus" role="status"></p>
            </section>

            <section class="review-months" id="reviewMonths" aria-label="Ord fordelt på måneder"></section>
        </main>
    </div>
    <script type="module" src="js/word-review.js?v=20260622-18"></script>
</body>
</html>
